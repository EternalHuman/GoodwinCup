<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Goodwin Cup - турнирная таблица</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Goodwin Cup">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <span class="brand-kicker">Goodwin Cup</span>
            <span class="brand-title">Турнирная таблица</span>
          </span>
        </a>
        <div class="topbar-actions">
          <span id="save-status" class="status-pill">Загрузка</span>
          <button id="refresh-button" class="ghost-button" type="button">Обновить</button>
          <button id="save-button" class="solid-button" type="button">Сохранить</button>
        </div>
      </header>

      <main>
        <section class="scoreboard-surface" aria-label="Турнирная таблица">
          <div id="table-root"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/assets/main.js"></script>
  </body>
</html>
